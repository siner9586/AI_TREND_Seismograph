name: Hourly Hotspots

on:
  schedule:
    - cron: "18 * * * *"
  workflow_dispatch:
    inputs:
      hour:
        description: "YYYY-MM-DDTHH; defaults to current UTC hour"
        required: false
        default: ""
      dry_run:
        description: "true/false"
        required: false
        default: "false"
      force:
        description: "true/false"
        required: false
        default: "false"

permissions:
  contents: write
  actions: read

jobs:
  hourly:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PUSH_WEBHOOK_URL: ${{ secrets.PUSH_WEBHOOK_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm install
      - name: Resolve hour
        id: vars
        run: |
          if [ -n "${{ github.event.inputs.hour }}" ]; then
            echo "hour=${{ github.event.inputs.hour }}" >> "$GITHUB_OUTPUT"
          else
            echo "hour=$(date -u +%Y-%m-%dT%H)" >> "$GITHUB_OUTPUT"
          fi
          echo "dry_run=${{ github.event.inputs.dry_run || 'false' }}" >> "$GITHUB_OUTPUT"
          echo "force=${{ github.event.inputs.force || 'false' }}" >> "$GITHUB_OUTPUT"
      - name: Generate hourly hotspots
        run: |
          python -m trend_seismograph run-hourly \
            --hour "${{ steps.vars.outputs.hour }}" \
            --storage="${{ env.DATABASE_URL != '' && 'both' || 'file' }}" \
            --dry-run="${{ steps.vars.outputs.dry_run }}" \
            --force="${{ steps.vars.outputs.force }}"
      - name: QA hourly
        if: steps.vars.outputs.dry_run != 'true'
        run: python -m trend_seismograph qa-hourly --hour "${{ steps.vars.outputs.hour }}"
      - name: Push hotspots with dedupe
        if: steps.vars.outputs.dry_run != 'true'
        run: python -m trend_seismograph push-hotspots
      - name: Build site
        if: steps.vars.outputs.dry_run != 'true'
        run: npm run build
      - name: Commit generated data
        if: steps.vars.outputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data web/public/data
          if git diff --cached --quiet; then
            echo "No generated data changes"
          else
            git commit -m "Update hourly hotspots ${{ steps.vars.outputs.hour }}"
            git push
          fi
