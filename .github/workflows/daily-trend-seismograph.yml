name: Daily Trend Seismograph

on:
  schedule:
    - cron: "25 22 * * *"
  workflow_dispatch:
    inputs:
      report_date:
        description: "YYYY-MM-DD; defaults to UTC today"
        required: false
        default: ""
      lookback_hours:
        description: "Lookback hours"
        required: false
        default: "72"
      dry_run:
        description: "true/false"
        required: false
        default: "false"
      force:
        description: "true/false"
        required: false
        default: "false"

permissions:
  contents: write
  actions: read

jobs:
  daily:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
      OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
      PUSH_WEBHOOK_URL: ${{ secrets.PUSH_WEBHOOK_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm install
      - name: Resolve date
        id: vars
        run: |
          if [ -n "${{ github.event.inputs.report_date }}" ]; then
            echo "report_date=${{ github.event.inputs.report_date }}" >> "$GITHUB_OUTPUT"
          else
            echo "report_date=$(date -u +%F)" >> "$GITHUB_OUTPUT"
          fi
          echo "lookback_hours=${{ github.event.inputs.lookback_hours || '72' }}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${{ github.event.inputs.dry_run || 'false' }}" >> "$GITHUB_OUTPUT"
          echo "force=${{ github.event.inputs.force || 'false' }}" >> "$GITHUB_OUTPUT"
      - name: Generate daily report
        run: |
          python -m trend_seismograph run-daily \
            --date "${{ steps.vars.outputs.report_date }}" \
            --lookback-hours "${{ steps.vars.outputs.lookback_hours }}" \
            --storage="${{ env.DATABASE_URL != '' && 'both' || 'file' }}" \
            --dry-run="${{ steps.vars.outputs.dry_run }}" \
            --force="${{ steps.vars.outputs.force }}"
      - name: QA daily report
        if: steps.vars.outputs.dry_run != 'true'
        run: python -m trend_seismograph qa --date "${{ steps.vars.outputs.report_date }}"
      - name: Build site
        if: steps.vars.outputs.dry_run != 'true'
        run: npm run build
      - name: Commit generated data
        if: steps.vars.outputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data web/public/data
          if git diff --cached --quiet; then
            echo "No generated data changes"
          else
            git commit -m "Update daily trend report ${{ steps.vars.outputs.report_date }}"
            git push
          fi
